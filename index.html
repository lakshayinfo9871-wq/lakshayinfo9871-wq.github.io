<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lakshay Kumar | Growth Portfolio</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:rgba(10,10,10,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-weight:600;
font-size:18px;
}

nav{
display:flex;
gap:25px;
}

nav a{
color:#ccc;
text-decoration:none;
font-size:14px;
transition:0.3s;
}

nav a:hover{
color:#fff;
}

.cta{
border:1px solid #fff;
padding:8px 18px;
text-decoration:none;
color:#fff;
font-size:14px;
transition:0.3s;
}

.cta:hover{
background:#fff;
color:#000;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:0 20px;
}

.hero h1{
font-size:64px;
font-weight:700;
background:linear-gradient(90deg,#fff,#888);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:20px;
font-size:18px;
color:#aaa;
}

.hero-buttons{
margin-top:30px;
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:12px 28px;
border:1px solid #fff;
color:#fff;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
background:#fff;
color:#000;
}

.btn-secondary{
border:1px solid #333;
color:#aaa;
}

.btn-secondary:hover{
color:#fff;
border-color:#fff;
}

/* MOBILE MENU */
.menu-toggle{
display:none;
font-size:22px;
cursor:pointer;
}

@media(max-width:768px){

nav{
display:none;
position:absolute;
top:60px;
right:8%;
flex-direction:column;
background:#111;
padding:20px;
}

nav.active{
display:flex;
}

.menu-toggle{
display:block;
}

.hero h1{
font-size:36px;
}

}

</style>

</head>

<body>

<!-- HEADER -->
<header>
<div class="logo">Lakshay</div>

<nav id="nav">
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Work</a>
<a href="#">Contact</a>
</nav>

<a href="https://wa.me/917217797821" class="cta">Hire Me</a>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>I Build Systems That Generate Sales</h1>

<p>
Websites, Ads & Automation to grow your business
</p>

<div class="hero-buttons">
<a href="https://wa.me/917217797821" class="btn">Work With Me</a>
<a href="#" class="btn btn-secondary">View Work</a>
</div>

</div>
</section>

<script>
function toggleMenu(){
document.getElementById("nav").classList.toggle("active");
}
</script>

</body>
</html>
